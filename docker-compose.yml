version: "3.9"

services:
  db:
    image: postgres:15
    container_name: locol_db
    restart: always
    environment:
      POSTGRES_USER: locol
      POSTGRES_PASSWORD: locol
      POSTGRES_DB: locol_db
    volumes:
      - locol_pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: locol_backend
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg2://locol:locol@db:5432/locol_db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: locol_frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: npm run dev -- --host

volumes:
  locol_pg_data: